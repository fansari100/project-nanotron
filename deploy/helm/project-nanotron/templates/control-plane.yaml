{{- if .Values.controlPlane.enabled }}
{{- $name := printf "%s-control-plane" (include "nanotron.fullname" .) -}}
{{- $dataPlaneName := printf "%s-data-plane" (include "nanotron.fullname" .) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "nanotron.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  replicas: {{ .Values.controlPlane.replicaCount }}
  selector:
    matchLabels:
      {{- include "nanotron.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        {{- include "nanotron.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: control-plane
      annotations:
        {{- toYaml .Values.controlPlane.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "nanotron.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: control-plane
          image: "{{ .Values.image.repository }}/{{ .Values.controlPlane.image.name }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8090
          env:
            - name: NANOTRON_CP_DATA_PLANE_URL
              value: http://{{ $dataPlaneName }}:{{ .Values.dataPlane.service.port }}
            {{- range $k, $v := .Values.controlPlane.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "nanotron.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  type: {{ .Values.controlPlane.service.type }}
  ports:
    - port: {{ .Values.controlPlane.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "nanotron.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
{{- if .Values.controlPlane.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $name }}
  labels: {{- include "nanotron.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $name }}
  minReplicas: {{ .Values.controlPlane.hpa.minReplicas }}
  maxReplicas: {{ .Values.controlPlane.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.controlPlane.hpa.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
