server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback — let the React router handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy the websocket through to the rust data plane in compose / k8s.
    location /ws {
        proxy_pass         http://data-plane:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 24h;
    }

    # Long cache on hashed assets, short cache on the entry html.
    location ~* \.(js|css|woff2?|png|jpg|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
