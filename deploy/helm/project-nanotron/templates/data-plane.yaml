{{- if .Values.dataPlane.enabled }}
{{- $name := printf "%s-data-plane" (include "nanotron.fullname" .) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "nanotron.labels" . | nindent 4 }}
    app.kubernetes.io/component: data-plane
spec:
  replicas: {{ .Values.dataPlane.replicaCount }}
  selector:
    matchLabels:
      {{- include "nanotron.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: data-plane
  template:
    metadata:
      labels:
        {{- include "nanotron.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: data-plane
      annotations:
        {{- toYaml .Values.dataPlane.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "nanotron.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: data-plane
          image: "{{ .Values.image.repository }}/{{ .Values.dataPlane.image.name }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            {{- range $k, $v := .Values.dataPlane.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.dataPlane.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "nanotron.labels" . | nindent 4 }}
    app.kubernetes.io/component: data-plane
spec:
  type: {{ .Values.dataPlane.service.type }}
  ports:
    - port: {{ .Values.dataPlane.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "nanotron.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: data-plane
{{- if .Values.dataPlane.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $name }}
  labels: {{- include "nanotron.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $name }}
  minReplicas: {{ .Values.dataPlane.hpa.minReplicas }}
  maxReplicas: {{ .Values.dataPlane.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.dataPlane.hpa.targetCPUUtilizationPercentage }}
{{- end }}
{{- if .Values.dataPlane.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $name }}
  labels: {{- include "nanotron.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.dataPlane.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "nanotron.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: data-plane
{{- end }}
{{- end }}
