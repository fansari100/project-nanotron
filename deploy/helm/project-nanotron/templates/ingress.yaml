{{- if .Values.ingress.enabled -}}
{{- $name := include "nanotron.fullname" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}
  labels: {{- include "nanotron.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api/control
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}-control-plane
                port: { number: {{ .Values.controlPlane.service.port }} }
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}-data-plane
                port: { number: {{ .Values.dataPlane.service.port }} }
          - path: /api/data
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}-data-plane
                port: { number: {{ .Values.dataPlane.service.port }} }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}-frontend
                port: { number: {{ .Values.frontend.service.port }} }
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
{{- end }}
